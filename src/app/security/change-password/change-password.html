<div class="change-password-page">
    <div class="change-password-form">
        <form>
            @if(warningMessage) {
                <div [innerHTML]="warningMessage" class="alert alert-danger"></div>
            }
            <mat-form-field class="entry-row" appearance="outline">
                <input matInput class="change-password-entry" type="password" id="oldPassword" name="oldPassword" placeholder="Old Password" [(ngModel)]="oldPassword">
            </mat-form-field>
            <mat-form-field class="entry-row" appearance="outline">
                <input matInput class="change-password-entry" type="password" id="newPassword" name="newPassword" placeholder="New Password" [(ngModel)]="newPassword">
            </mat-form-field>
            <mat-form-field class="entry-row" appearance="outline">
                <input matInput class="change-password-entry" type="password" id="reEnterNewPassword" name="reEnterNewPassword" placeholder="Re-Enter New Password" [(ngModel)]="reEnterNewPassword">
            </mat-form-field>
        </form>
        <button mat-flat-button class="submit-button" color="primary" (click)="onSubmit($event)">Submit</button>
    </div>
</div>
